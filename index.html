<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>photolyze — tissue absorption spectra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #faf8f4;
        --panel: #ffffff;
        --ink: #1a1714;
        --muted: #8a837a;
        --faint: #b6afa4;
        --line: #e8e3da;
        --line-2: #f1ede5;
        --spectrum: linear-gradient(90deg, #6b2d8e 0%, #2f4fc0 22%, #1aa06a 46%, #e6b800 68%, #ef6a2a 84%, #c5372b 100%);
        --sans: "IBM Plex Sans", system-ui, sans-serif;
        --mono: "IBM Plex Mono", ui-monospace, monospace;
      }
      * { box-sizing: border-box; }
      html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
      body {
        margin: 0;
        font-family: var(--sans);
        color: var(--ink);
        background: var(--paper);
        font-size: 14px;
        line-height: 1.5;
      }

      header {
        padding: 26px 32px 18px;
        border-bottom: 1px solid var(--line);
      }
      .wordmark {
        font-weight: 600;
        font-size: 21px;
        letter-spacing: -0.025em;
        display: inline-block;
      }
      .wordmark::after {
        content: "";
        display: block;
        height: 3px;
        margin-top: 5px;
        border-radius: 2px;
        background: var(--spectrum);
      }
      header .sub {
        margin-top: 9px;
        font-family: var(--mono);
        font-size: 11.5px;
        letter-spacing: 0.01em;
        color: var(--muted);
      }

      .layout {
        display: grid;
        grid-template-columns: 312px minmax(0, 1fr);
        gap: 28px;
        padding: 24px 32px 40px;
        max-width: 1440px;
      }
      .controls { display: flex; flex-direction: column; gap: 22px; }
      .controls > section { animation: rise 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) backwards; }
      .controls > section:nth-child(2) { animation-delay: 0.04s; }
      .controls > section:nth-child(3) { animation-delay: 0.08s; }
      .controls > section:nth-child(4) { animation-delay: 0.12s; }
      .controls > section:nth-child(5) { animation-delay: 0.16s; }
      @keyframes rise { from { opacity: 0; transform: translateY(6px); } }

      .label {
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--faint);
        margin: 0 0 11px;
      }

      label.row {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 4px 0;
        cursor: pointer;
        line-height: 1.3;
      }
      label.row input[type="checkbox"] { accent-color: var(--ink); width: 14px; height: 14px; }
      .swatch { width: 16px; height: 3px; border-radius: 2px; flex: none; }
      .rowx {
        margin-left: auto;
        border: none;
        background: none;
        color: var(--faint);
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        padding: 0 2px;
      }
      .rowx:hover { color: var(--ink); }

      .addlink {
        width: 100%; text-align: left; margin-top: 9px;
        border: 1px dashed var(--line); border-radius: 7px; padding: 7px 10px;
        background: none; color: var(--muted);
      }
      .addlink:hover { border-color: var(--faint); color: var(--ink); }
      .addform {
        margin-top: 10px; padding: 12px; border: 1px solid var(--line);
        border-radius: 8px; background: var(--paper); display: flex; flex-direction: column; gap: 8px;
      }
      .addform[hidden] { display: none; }
      .addform input[type="text"], .addform textarea { width: 100%; }
      .addform textarea {
        font-family: var(--mono); font-size: 11.5px; color: var(--ink); background: var(--panel);
        border: 1px solid var(--line); border-radius: 7px; padding: 8px; resize: vertical; line-height: 1.5;
      }
      .addform .top { display: flex; gap: 8px; align-items: center; }
      .row.gap { color: var(--faint); }
      .row.gap .swatch { background: none !important; border: 1px dashed var(--faint); height: 7px; }
      .row.gap .addhere {
        margin-left: auto; border: none; background: none; color: var(--muted);
        cursor: pointer; font-size: 11px; padding: 0; border-bottom: 1px solid var(--faint);
      }
      .row.gap .addhere:hover { color: var(--ink); }

      button, select, input[type="text"], input[type="number"] {
        font-family: var(--sans);
        font-size: 13px;
        color: var(--ink);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 6px 10px;
      }
      button { cursor: pointer; transition: border-color 0.12s, background 0.12s, color 0.12s; }
      button:hover { border-color: var(--faint); }
      button.active { background: var(--ink); border-color: var(--ink); color: #fff; }
      select { width: 100%; cursor: pointer; }
      .btnrow { display: flex; flex-wrap: wrap; gap: 6px; }
      .caption { font-family: var(--mono); font-size: 10.5px; color: var(--faint); margin-top: 9px; letter-spacing: 0.01em; }

      .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
      .chip { font-size: 11.5px; border-radius: 999px; padding: 3px 10px; display: inline-flex; align-items: center; gap: 5px; }
      .chip.on { background: #b42318; border-color: #b42318; color: #fff; }
      .chip .x { opacity: 0.6; }
      .chip .x:hover { opacity: 1; }

      .chartbar { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
      .rangebox { display: flex; align-items: center; gap: 6px; }
      .rangebox input { width: 66px; font-family: var(--mono); font-size: 12px; text-align: right; }
      .rangebox .dash, .rangebox .unit { font-family: var(--mono); font-size: 12px; color: var(--muted); }
      .rangebox button { font-size: 11.5px; padding: 4px 10px; margin-left: 4px; }

      .field { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
      .field .k { font-family: var(--mono); font-size: 11px; color: var(--muted); }
      input[type="number"] { width: 78px; }
      input[type="color"] { width: 30px; height: 30px; padding: 0; border: 1px solid var(--line); border-radius: 7px; background: none; cursor: pointer; }
      .filebtn {
        font-size: 12px; color: var(--muted); border: 1px solid var(--line); border-radius: 7px;
        padding: 6px 10px; cursor: pointer; transition: border-color 0.12s, color 0.12s;
      }
      .filebtn:hover { border-color: var(--faint); color: var(--ink); }
      .filebtn input { display: none; }
      .msg { font-family: var(--mono); font-size: 11px; margin-top: 8px; min-height: 15px; }
      .msg.err { color: #b42318; }
      .msg.ok { color: #0a7d4d; }

      .canvas { min-width: 0; }
      .chartwrap {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
      }
      #chart { padding: 14px 14px 6px; }
      #chart svg { max-width: 100%; height: auto; display: block; cursor: crosshair; }

      .readout {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--ink);
        padding: 12px 4px 2px;
        min-height: 22px;
        letter-spacing: 0.01em;
      }
      .readout .empty { color: var(--faint); }
      .readout b { font-weight: 500; }
      .result { font-family: var(--mono); font-size: 12px; color: #0a7d4d; margin-top: 10px; min-height: 16px; }
      .foot { margin-top: 18px; font-family: var(--mono); font-size: 10.5px; color: var(--faint); }
      .foot a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--line); }
      .foot a:hover { color: var(--ink); }
    </style>
  </head>
  <body>
    <header>
      <span class="wordmark">photolyze</span>
      <div class="sub">absorption spectra of tissue chromophores · clinical laser wavelengths</div>
    </header>

    <div class="layout">
      <aside class="controls">
        <section>
          <p class="label">Curves</p>
          <div id="curveList"></div>
          <button id="addToggle" class="addlink">+ Add a curve</button>
          <div id="addForm" class="addform" hidden>
            <input type="text" id="impLabel" placeholder="Curve name" />
            <input type="text" id="impSource" placeholder="Source / citation" />
            <div class="top">
              <input type="color" id="impColor" value="#2d8a6d" title="Colour" />
              <label class="filebtn">Upload<input type="file" id="impFile" accept=".csv,.txt,.json" /></label>
              <span class="caption" id="impFileName" style="margin: 0;"></span>
            </div>
            <textarea id="impData" rows="4" placeholder="1500, 2.1&#10;1700, 5.4&#10;2940, 31"></textarea>
            <div class="btnrow">
              <button id="impAdd">Add</button>
              <button id="addCancel">Cancel</button>
            </div>
            <div class="msg" id="impMsg"></div>
          </div>
          <p class="caption">data · <a href="/data/laser-tissue.json" target="_blank">data/laser-tissue.json</a></p>
        </section>

        <section>
          <p class="label">Lasers</p>
          <div class="btnrow">
            <button id="laserAll" class="active">All</button>
            <button id="laserNone">None</button>
          </div>
          <div class="chips" id="laserChips"></div>
          <button id="laserAddToggle" class="addlink">+ Add a laser</button>
          <div id="laserAddForm" class="addform" hidden>
            <input type="text" id="lzLabel" placeholder="Laser name" />
            <div class="field" style="margin: 0;">
              <input type="number" id="lzNm" placeholder="wavelength" /><span class="k">nm</span>
            </div>
            <div class="btnrow">
              <button id="lzAdd">Add</button>
              <button id="lzCancel">Cancel</button>
            </div>
            <div class="msg" id="lzMsg"></div>
          </div>
          <p class="caption">Click a laser to read its μa</p>
        </section>

        <section>
          <p class="label">Compare</p>
          <div class="field">
            <span class="k">λ₁</span><input type="number" id="cmpA" value="2940" />
            <span class="k">λ₂</span><input type="number" id="cmpB" value="2780" />
          </div>
          <div class="field"><span class="k">on</span><select id="cmpCurve"></select></div>
          <div class="btnrow">
            <button id="cmpRun">Compare</button>
            <button id="cmpClear">Clear</button>
          </div>
          <div class="result" id="cmpResult"></div>
        </section>
      </aside>

      <main class="canvas">
        <div class="chartbar">
          <div class="rangebox">
            <input type="number" id="rangeFrom" /><span class="dash">–</span><input type="number" id="rangeTo" /><span class="unit">nm</span>
            <button id="rangeFull">Full</button>
          </div>
        </div>
        <div class="chartwrap">
          <div id="chart"></div>
        </div>
        <div class="readout" id="readout"><span class="empty">Hover the chart to read μa at any wavelength</span></div>
        <div class="foot">μa in cm⁻¹ · log–log · data from original literature · <a id="sourcesLink" href="/data/SOURCES.md" target="_blank">sources &amp; gaps</a></div>
      </main>
    </div>
    <script type="module" src="/app/main.ts"></script>
  </body>
</html>
